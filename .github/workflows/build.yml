name: Purswm Build

on:
  push:
    branches: [ master, main ]
    paths:
      - 'Purpur/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'Purpur/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'master'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '21' ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: '${{ matrix.java }}'
          distribution: 'temurin'

      - name: Create Gradle Wrapper
        run: |
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o gradlew
          chmod +x gradlew

      - name: Run Wrapper from Root
        working-directory: Purpur
        run: |
          ../gradlew tasks --all --no-daemon --console=plain 2>&1 | tail -200 || true

      - name: Upload Build Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-tasks-report
          path: |
            **/*.log
          if-no-files-found: ignore
          retention-days: 7

name: Purswm Build

on:
  push:
    branches: [ master, main ]
    paths:
      - 'Purpur/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'Purpur/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Fetch Gradle Wrapper Files for Gradle 9
        run: |
          mkdir -p Purpur/gradle/wrapper
          
          # Download Gradle 9.0 snapshot wrapper
          curl -fsSL "https://services.gradle.org/distributions/gradle-9.0.0-20250613183551+0000-bin.zip" -o gradle-9.zip 2>/dev/null || true
          if [ -f gradle-9.zip ]; then
            unzip -j gradle-9.zip "*/lib/gradle-launcher-*.jar" -d /tmp/gradle9 2>/dev/null || true
          fi
          
          # Use Gradle 8.9 wrapper (compatible with paperweight 1.5.0)
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar -o Purpur/gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew -o Purpur/gradlew
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew.bat -o Purpur/gradlew.bat
          chmod +x Purpur/gradlew

      - name: Run Gradle Tasks
        run: |
          cd Purpur
          ./gradlew tasks --no-daemon --console=plain 2>&1 || true

      - name: Upload Build Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: |
            **/build/**
            **/*.log
          if-no-files-found: ignore

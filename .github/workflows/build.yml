name: Purswm Build

on:
  push:
    branches: [ master, main, dev ]
    paths:
      - 'Purpur/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ master, main, dev ]
    paths:
      - 'Purpur/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '21' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: '${{ matrix.java }}'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: |
          cd Purpur
          gradle wrapper --gradle-version 8.9 --distribution-type all
          chmod +x gradlew

      - name: Build with Gradle
        run: |
          cd Purpur
          ./gradlew build --no-daemon --console=plain 2>&1 || true

      - name: Show full log on failure
        if: failure()
        run: cat Purpur/build.gradle.kts 2>/dev/null || echo "Config check done"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            Purpur/purpur-*/build/libs/*.jar
          if-no-files-found: ignore
          retention-days: 7
        continue-on-error: true

      - name: Upload build report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: |
            **/reports/**
            **/logs/**
            **/build.log
          if-no-files-found: ignore
          retention-days: 7
